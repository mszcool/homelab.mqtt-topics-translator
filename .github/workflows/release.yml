name: Release

on:
  push:
    branches: [release]

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Start Docker Compose services
        run: docker compose up -d --build

      - name: Wait for services to be ready
        run: sleep 5

      - name: Run integration tests
        run: |
          dotnet test src/mqtttranslator.tests/MszCool.MqttTopicsTranslator.Tests.csproj \
            --logger 'console;verbosity=detailed'

      - name: Tear down services
        if: always()
        run: docker compose down

      - name: Compute next release tag
        id: tag
        run: |
          DATE_PREFIX="$(date -u +%Y%m%d)"
          MAX=-1
          for t in $(git tag -l "${DATE_PREFIX}.*"); do
            N="${t#${DATE_PREFIX}.}"
            if [[ "$N" =~ ^[0-9]+$ ]] && (( N > MAX )); then
              MAX=$N
            fi
          done
          NEXT=$(( MAX + 1 ))
          TAG="${DATE_PREFIX}.${NEXT}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "==> Next release tag: ${TAG}"

      - name: Create and push git tag
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.tag.outputs.tag }}"
          git push origin "${{ steps.tag.outputs.tag }}"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build Docker image
        run: |
          docker build \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/mqtt-topics-translator:${{ steps.tag.outputs.tag }}" \
            -t "${{ secrets.DOCKERHUB_USERNAME }}/mqtt-topics-translator:latest" \
            -f Dockerfile .

      - name: Push Docker image
        run: |
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/mqtt-topics-translator:${{ steps.tag.outputs.tag }}"
          docker push "${{ secrets.DOCKERHUB_USERNAME }}/mqtt-topics-translator:latest"

      - name: Summary
        run: |
          echo "### Release Published :rocket:" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Tag**: \`${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Image**: \`${{ secrets.DOCKERHUB_USERNAME }}/mqtt-topics-translator:${{ steps.tag.outputs.tag }}\`" >> "$GITHUB_STEP_SUMMARY"
